<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다음스포츠 | 순위</title>
    
    <style>
        /* 🎀🎀🎀🎀🎀🎀🎀🎀🎀🎀🎀🎀🎀🎀🎀🎀🎀🎀🎀🎀🎀🎀🎀🎀🎀🎀 */
        
        

        body {
            background-color: white;
            margin: 0;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
        }

        .sports-nav {
            display: flex;
            padding: 0 24px;
        }

        .sports-nav span {
            color: #494949;
            font-size: 14px;
            padding: 12px 16px;
            display: inline-block;
        }

        .sports-nav,
        .league-tab,
        .filter-bar,
        .table-wrap {
            max-width: 1100px;
            margin: 0 auto;
        }

        .sports-nav span.active {
            color: #e12d18;
            font-weight: bold;
            border-bottom: 2px solid #e12d18;
        }

        .sub-nav {
            background-color: #e12d18;
            display: flex;
            padding: 0 24px;
        }

        .sub-nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            padding: 0 24px;
        }

        .sub-nav span {
            color: #ffffff;
            font-size: 14px;
            padding: 13px 18px;
            display: inline-block;
        }

        .sub-nav span.active {
            color: #ffffff;
            font-weight: bold;
            border-bottom: 2px solid #ffffff;
        }

        .league-tab {
            display: flex;
            gap: 20px;
            padding: 20px 24px 0;
        }

        .league-tab span {
            font-size: 14px;
            color: #000000;
            padding-bottom: 6px;
        }

        .league-tab span.active {
            color: #e12d18;
            font-weight: bold;
            border-bottom: 2px solid #e12d18;
        }

        .year-selector {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 20px;
            font-weight: bold;
        }

        .year-selector span.arrow { 
            font-size: 18px; 
            color: yellowSS; 
        }

        .table-wrap {
            padding: 43px 24px 22px;
            overflow-x: auto;
            margin: 0 auto;
            max-width: 1100px;
        }

        .rank-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .rank-title {
            font-size: 16px;
            font-weight: bold;
            color: #000000;
        }

        .rank-data {
            font-size: 12px;
            color: #333;
        }

        table {
            table-layout: fixed;
            width: 1100px;
            height: 486px;
            border-collapse: collapse;
            text-align: center;
        }

        thead tr {
            background-color: #f7f7f7;
        }

        th {
            padding: 12px 8px;
            color: #494949;
            font-size: 13px;
            font-weight: normal;
            border-top: 2px solid #757575;
            border-bottom: 1px solid rgb(173, 173, 173);
        }

        td {
            padding: 12px 8px;
            border-bottom: 1px solid #e5e5e5;
            background-color: white;
            font-size: 13px;

        }

        th:nth-child(1), td:nth-child(1) { width: 4%;  text-align: center; }
        th:nth-child(2), td:nth-child(2) { width: 52%; text-align: left; }
        th:nth-child(3), td:nth-child(3) { width: 6%; }
        th:nth-child(4), td:nth-child(4) { width: 6%; }
        th:nth-child(5), td:nth-child(5) { width: 6%; }
        th:nth-child(6), td:nth-child(6) { width: 6%; }
        th:nth-child(7), td:nth-child(7) { width: 6%; }
        th:nth-child(8), td:nth-child(8) { width: 8%; }
        th:nth-child(9), td:nth-child(9) { width: 6%; }

        .team-cell { 
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .td_name {
            text-align: left;
        }

        .team-logo { 
            width: 32px; 
            height: 32px;
        }

        .win {
            font-weight: bold;
            background-color: #4086FF0F;
        }

        .th_win {
            color: #1760f0;
        }

        .table-note {
            font-size: 12px;
            color: #494949;
            margin-top: 10px;
        }

    </style>
</head>
<body>

    <nav class="sports-nav">
        <span>홈</span>
        <span>축구</span>
        <span>해외축구</span>
        <span class="active">야구</span>
        <span>해외야구</span>
        <span>골프</span>
        <span>농구</span>
        <span>배구</span>
        <span>일반</span>
        <span>핸드볼</span>
        <span>e-스포츠</span>
    </nav>

    <nav class="sub-nav">
        <div class="sub-nav-inner">
            <span>뉴스</span>
            <span>영상</span>
            <span>일정</span>
            <span class="active">순위</span>
            <span>팀/선수</span>
            <span>테이블</span>
        </div>
    </nav>

    <div class="league-tab">
        <span class="active">KBO리그</span>
        <span>퓨처스리그</span>
    </div>

    </div>
    <div class="year-selector">
        <span class="arrow">&#8249;</span>
        <span>2025 ▾</span>
        <span class="arrow">&#8250;</span>
    </div>
</div>
    <div class="table-wrap">
        <div class="rank-header">
            <span class="rank-title">종합 순위</span>
            <span class="rank-data" id="today-date"></span>
        </div>

        <table id="rank-table">
            <thead>
                <tr>
                    <th>순위</th>
                    <th>팀</th>
                    <th>경기</th>
                    <th>승</th>
                    <th>무</th>
                    <th>패</th>
                    <th class="th_win">승률</th>
                    <th>게임차</th>
                    <th>연속</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>

        <p class="table-note">1, 2위 최종 순위는 한국시리즈 결과를 반영합니다.</p>
    </div>
    <script>
        const today = new Date();
        const dateStr = `※${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 기준`;
        document.getElementById('today-date').textContent = dateStr;
        
        const jsonUrl = 'https://prof-jwchi.github.io/kopo-front2026/Json/baseball.json';
        
        var request = new XMLHttpRequest();
        request.open("GET", jsonUrl);
        request.send();

        request.addEventListener('load', () => {

            const textData = request.response;
            const data = JSON.parse(textData);

            //window.data = data;

            // ❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤❤

            const tbody = document.getElementById('table-body');

            data.list.forEach(team => {
                const tr = document.createElement('tr');

                tr.innerHTML = `
                    <td>${team.rank.rank}</td>
                        <td class="td_name">
                            <div class="team-cell">
                                <img src="${team.imageUrl}" class="team-logo">
                                ${team.shortName}
                            </div>
                        </td>
                        <td>${team.rank.game}</td>
                        <td>${team.rank.win}</td>
                        <td>${team.rank.draw}</td>
                        <td>${team.rank.loss}</td>
                        <td class="win">${team.rank.wpct}</td>
                        <td>${team.rank.gb}</td>
                        <td>${team.rank.streak}</td>
                    `;

                    tbody.appendChild(tr);
                    
                });
            });
        

    </script>

</body>
</html>
